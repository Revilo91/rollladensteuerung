name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    permissions:
      administration: write
    steps:
      - uses: actions/checkout@v4
      - name: Set repository description and topics
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description: 'Advanced cover/shutter control integration for Home Assistant'
            });
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: ['home-assistant', 'hacs', 'home-automation', 'custom-integration', 'cover']
            });
      - name: HACS Action
        uses: hacs/action@22.5.0
        with:
          category: integration

  validate-hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check --output-format=github custom_components/
